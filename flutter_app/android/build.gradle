allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    // Provide flutter compilation defaults for plugins whose build.gradle
    // references flutter.compileSdkVersion before the Flutter tooling injects it.
    if (project.name != "app") {
        project.ext.set("flutter", [
            compileSdkVersion: 35,
            minSdkVersion: 29,
            targetSdkVersion: 36
        ])
    }
}

subprojects {
    project.evaluationDependsOn(":app")

    // Fix plugins that still reference the deprecated jcenter() repository (#69).
    // Force all subprojects to use mavenCentral() instead.
    project.afterEvaluate {
        project.repositories {
            mavenCentral()
        }
        project.repositories.removeIf { repo ->
            repo instanceof MavenArtifactRepository && repo.url.toString().contains("jcenter")
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
