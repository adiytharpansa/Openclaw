# Analysis options for OpenClaw Flutter app
# Enforces code quality and best practices

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Error prevention
    - avoid_empty_else
    - avoid_relative_lib_imports
    - avoid_returning_null_for_future
    - avoid_types_as_parameter_names
    - cancel_subscriptions
    - close_sinks
    - empty_statements
    - no_adjacent_strings_in_list
    - no_duplicate_case_values
    - prefer_void_to_null
    - valid_regexps

    # Style
    - annotate_overrides
    - avoid_init_to_null
    - avoid_null_checks_in_equality_operators
    - avoid_single_cascade_in_expression_statements
    - constant_identifier_names
    - empty_catches
    - empty_constructor_bodies
    - library_names
    - library_prefixes
    - non_constant_identifier_names
    - null_closures
    - omit_local_variable_types
    - prefer_adjacent_string_concatenation
    - prefer_collection_literals
    - prefer_conditional_assignment
    - prefer_contains
    - prefer_final_fields
    - prefer_final_locals
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_single_quotes
    - prefer_typing_uninitialized_variables
    - sort_constructors_first
    - type_init_formals
    - unawaited_futures
    - unnecessary_const
    - unnecessary_new
    - unnecessary_null_in_if_null_operators
    - unnecessary_this
    - use_rethrow_when_possible

    # Performance
    - avoid_unused_constructor_parameters
    - prefer_final_in_for_each
    - unnecessary_brace_in_string_interps

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  
  errors:
    # Treat missing required parameters as errors
    missing_required_param: error
    # Treat missing return statements as errors
    missing_return: error
    # Allow unused parameters (useful for callbacks)
    unused_element_parameter: ignore
    unused_local_variable: warning
  
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
